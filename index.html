<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페트 계산기 Pro</title>
<style>
    :root {
        --bg-main: #0b101a;
        --bg-panel: #161a24;
        --border-main: #252e3f;
        --accent-gold: #e6b94d;
        --text-gold: #e6b94d;
        --text-main: #d1d8e0;
        --text-sub: #707a8c;
        --input-bg: #070a10;
    }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-main);
        font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
        color: var(--text-main);
        min-height: 100vh;
        display: flex; flex-direction: column; align-items: center;
    }

    .container {
        max-width: 480px; width: 90%; margin: 30px auto; padding: 30px;
        background: var(--bg-panel); border: 1px solid var(--border-main); border-radius: 16px;
    }

    h1 { text-align: center; margin-bottom: 25px; font-size: 24px; color: var(--text-gold); }

    .intro {
        margin-bottom: 25px; padding: 18px; background: rgba(230, 185, 77, 0.05);
        border: 1px solid var(--border-main); border-radius: 12px;
        line-height: 1.6; text-align: center; color: var(--text-sub); font-size: 13px;
    }

    .input-group { position: relative; margin-bottom: 25px; }
    label { display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: var(--text-gold); }

    #pet-name {
        width: 100%; padding: 16px; font-size: 16px; background: var(--input-bg);
        border: 1px solid var(--border-main); color: #fff; border-radius: 10px; box-sizing: border-box; outline: none;
    }

    .stat-row {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 10px;
    }

    .control-group { display: flex; align-items: center; gap: 8px; }

    input[type="number"] {
        width: 65px; height: 44px; font-size: 18px; font-weight: 700;
        border: 1px solid var(--border-main); border-radius: 8px;
        text-align: center; background: var(--input-bg); color: #fff;
    }

    .btn-step {
        width: 40px; height: 40px; border: 1px solid var(--border-main);
        background: #2a3345; border-radius: 8px; font-size: 18px; color: var(--text-gold); cursor: pointer;
    }

    #suggestions {
        list-style: none; padding: 0; margin: 0; position: absolute;
        top: 100%; left: 0; right: 0; background: #1a2233;
        border: 1px solid var(--accent-gold); border-radius: 0 0 10px 10px;
        max-height: 240px; overflow-y: auto; z-index: 999; display: none;
    }
    #suggestions li { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--border-main); }

    button#calculate-btn {
        width: 100%; margin-top: 25px; padding: 18px; font-size: 17px; font-weight: 700;
        background: var(--accent-gold); color: #1a2233; border: none; border-radius: 12px; cursor: pointer;
    }

    .result { margin-top: 25px; padding: 25px; background: var(--input-bg); border: 1px solid var(--border-main); border-radius: 12px; text-align: center; }
    #loading { display: none; text-align: center; margin-top: 15px; color: var(--text-gold); }
</style>
</head>
<body>
    <div class="container">
        <h1>페트 계산기</h1>
        <div class="intro">
            <strong>Update : 2026/03/04</strong><br>
            정석 대비 <strong>차이값(+/-)</strong>을 입력하세요.
        </div>

        <div class="input-group">
            <label for="pet-name">페트 이름</label>
            <input type="text" id="pet-name" placeholder="데이터 불러오는 중..." autocomplete="off" disabled>
            <ul id="suggestions"></ul>
        </div>

        <div class="stat-row"><div class="stat-label">체력 차이</div><div class="control-group"><button class="btn-step" onclick="step('diff-health', -1)">-</button><input type="number" id="diff-health" value="0" onclick="this.select()"><button class="btn-step" onclick="step('diff-health', 1)">+</button></div></div>
        <div class="stat-row"><div class="stat-label">공격력 차이</div><div class="control-group"><button class="btn-step" onclick="step('diff-attack', -1)">-</button><input type="number" id="diff-attack" value="0" onclick="this.select()"><button class="btn-step" onclick="step('diff-attack', 1)">+</button></div></div>
        <div class="stat-row"><div class="stat-label">방어력 차이</div><div class="control-group"><button class="btn-step" onclick="step('diff-defense', -1)">-</button><input type="number" id="diff-defense" value="0" onclick="this.select()"><button class="btn-step" onclick="step('diff-defense', 1)">+</button></div></div>
        <div class="stat-row"><div class="stat-label">순발력 차이</div><div class="control-group"><button class="btn-step" onclick="step('diff-agility', -1)">-</button><input type="number" id="diff-agility" value="0" onclick="this.select()"><button class="btn-step" onclick="step('diff-agility', 1)">+</button></div></div>

        <button id="calculate-btn" disabled>데이터 대기 중</button>

        <div id="result" class="result">페트를 선택해 주세요.</div>
        <div id="loading">계산 중...</div>
    </div>

    <script>
        let petData = {};
        let currentIdealStats = null;

        // 1. 부동 소수점 오차 방지 내림 함수
        const safetyFloor = (n) => Math.floor(n + 1e-9);

        async function loadPetData() {
            try {
                const response = await fetch('pet.json');
                petData = await response.json();
                const nameInput = document.getElementById("pet-name");
                nameInput.disabled = false;
                nameInput.placeholder = "이름 입력 (예: 보르비스)";
                document.getElementById("calculate-btn").innerText = "계산하기";
                document.getElementById("calculate-btn").disabled = false;
            } catch (e) {
                document.getElementById("result").innerText = "pet.json 로드 실패";
            }
        }
        loadPetData();

        function step(id, val) { 
            const el = document.getElementById(id); 
            el.value = parseInt(el.value || 0) + val; 
        }

        function getChosung(str) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let res = "";
            for(let i=0; i<str.length; i++) {
                let code = str.charCodeAt(i) - 44032;
                if(code >= 0 && code <= 11172) res += cho[Math.floor(code/588)];
                else res += str.charAt(i);
            }
            return res;
        }

        // 정석(모든 가중치 4.5) 스탯 계산
        function calculateIdealStats(pet) {
            const iH = ((pet.healthCoefficient + 4.5) * pet.initialCoefficient) / 100;
            const iA = ((pet.attackCoefficient + 4.5) * pet.initialCoefficient) / 100;
            const iD = ((pet.defenseCoefficient + 4.5) * pet.initialCoefficient) / 100;
            const iG = ((pet.agilityCoefficient + 4.5) * pet.initialCoefficient) / 100;
            return {
                health: safetyFloor(iH * 4 + iA + iD + iG),
                attack: safetyFloor(iH * 0.1 + iA + iD * 0.1 + iG * 0.05),
                defense: safetyFloor(iH * 0.1 + iA * 0.1 + iD + iG * 0.05),
                agility: safetyFloor(iG)
            };
        }

        const petNameInput = document.getElementById("pet-name");
        const suggestions = document.getElementById("suggestions");

        petNameInput.addEventListener("input", () => {
            const query = petNameInput.value.trim();
            suggestions.innerHTML = "";
            if (!query) { suggestions.style.display = "none"; return; }
            
            const qCho = getChosung(query);
            const matches = Object.keys(petData).filter(name => 
                name.includes(query) || getChosung(name).includes(qCho)
            ).slice(0, 10);

            if (matches.length > 0) {
                suggestions.style.display = "block";
                matches.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    li.onclick = () => {
                        petNameInput.value = name;
                        suggestions.style.display = "none";
                        currentIdealStats = calculateIdealStats(petData[name]);
                        document.getElementById("result").innerText = "차이값을 입력하고 계산을 눌러주세요.";
                    };
                    suggestions.appendChild(li);
                });
            } else { suggestions.style.display = "none"; }
        });

        document.getElementById("calculate-btn").addEventListener("click", () => {
            const name = petNameInput.value;
            if (!petData[name] || !currentIdealStats) { alert("페트를 선택해주세요!"); return; }
            
            document.getElementById("loading").style.display = "block";
            
            setTimeout(() => {
                const tH = currentIdealStats.health + parseInt(document.getElementById("diff-health").value || 0);
                const tA = currentIdealStats.attack + parseInt(document.getElementById("diff-attack").value || 0);
                const tD = currentIdealStats.defense + parseInt(document.getElementById("diff-defense").value || 0);
                const tG = currentIdealStats.agility + parseInt(document.getElementById("diff-agility").value || 0);

                const pet = petData[name];
                let matched = 0, hCases = 0;

                // 시뮬레이션: 성장률 랜덤값(-2 ~ +2) 및 보너스 스탯(합 10)
                for (let hR = -2; hR <= 2; hR++) {
                    for (let aR = -2; aR <= 2; aR++) {
                        for (let dR = -2; dR <= 2; dR++) {
                            for (let gR = -2; gR <= 2; gR++) {
                                for (let hB = 0; hB <= 10; hB++) {
                                    for (let aB = 0; aB <= 10 - hB; aB++) {
                                        for (let dB = 0; dB <= 10 - hB - aB; dB++) {
                                            const gB = 10 - hB - aB - dB;
                                            
                                            const iH = ((pet.healthCoefficient + hR + hB) * pet.initialCoefficient) / 100;
                                            const iA = ((pet.attackCoefficient + aR + aB) * pet.initialCoefficient) / 100;
                                            const iD = ((pet.defenseCoefficient + dR + dB) * pet.initialCoefficient) / 100;
                                            const iG = ((pet.agilityCoefficient + gR + gB) * pet.initialCoefficient) / 100;

                                            if (safetyFloor(iH * 4 + iA + iD + iG) === tH &&
                                                safetyFloor(iH * 0.1 + iA + iD * 0.1 + iG * 0.05) === tA &&
                                                safetyFloor(iH * 0.1 + iA * 0.1 + iD + iG * 0.05) === tD &&
                                                safetyFloor(iG) === tG) {
                                                matched++;
                                                if (hR === 2 && aR === 2 && dR === 2 && gR === 2) hCases++;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                if (matched === 0) {
                    document.getElementById("result").textContent = "존재할 수 없는 스탯 조합입니다.";
                } else {
                    const prob = ((hCases / matched) * 100).toFixed(2);
                    const displayProb = prob === "100.00" ? "99.9" : prob;
                    const trials = hCases > 0 ? (matched / hCases).toFixed(1) : "∞";
                    
                    document.getElementById("result").innerHTML = `
                        <div style="font-size:18px; color:#fff;">S급 확률 : <strong style="color:var(--text-gold)">${displayProb}%</strong></div>
                        <div style="margin-top:10px; font-size:13px; color:var(--text-sub);">
                            기대값 : 약 <strong>${trials}번</strong> 시도 필요<br>
                            <small>(경우의 수: ${matched}개 중 ${hCases}개)</small>
                        </div>`;
                }
                document.getElementById("loading").style.display = "none";
            }, 100);
        });

        document.addEventListener("click", (e) => { if (e.target !== petNameInput) suggestions.style.display = "none"; });
    </script>
</body>
</html>
