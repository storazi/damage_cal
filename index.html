<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정밀 페트 분석기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        :root { --bg: #0b101a; --panel: #161a24; --gold: #e6b94d; --text: #d1d8e0; --btn: #28a745; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--panel); padding: 25px; border-radius: 15px; width: 450px; border: 1px solid #252e3f; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 13px; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #070a10; border: 1px solid #252e3f; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-grid input { text-align: center; font-size: 16px; font-weight: bold; }
        #suggestions { list-style: none; padding: 0; margin: 0; position: absolute; width: 100%; background: #1a2233; border: 1px solid var(--gold); z-index: 10; display: none; border-radius: 8px; max-height: 200px; overflow-y: auto; }
        #suggestions li { padding: 12px; border-bottom: 1px solid #252e3f; cursor: pointer; }
        #calculate-btn { width: 100%; padding: 15px; background: var(--btn); border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 8px; margin-top: 20px; }
        .result-box { margin-top: 20px; padding: 20px; background: #070a10; border-radius: 10px; border: 1px solid #252e3f; text-align: center; line-height: 1.8; }
        .hl { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-group">
            <label>페트 검색 (이름/초성)</label>
            <input type="text" id="pet-search" placeholder="페트 이름 입력..." autocomplete="off">
            <ul id="suggestions"></ul>
        </div>
        <div class="input-group">
            <label>공격 | 방어 | 순발 | 체력 (S급 가이드)</label>
            <div class="stat-grid">
                <input type="number" id="inA" placeholder="S공">
                <input type="number" id="inD" placeholder="S방">
                <input type="number" id="inG" placeholder="S순">
                <input type="number" id="inH" placeholder="S체">
            </div>
        </div>
        <button id="calculate-btn">분석 시작</button>
        <div id="result" class="result-box">결과가 여기에 표시됩니다.</div>
    </div>

    <script>
        // 데이터셋 직접 관리 (주신 양식)
        const petData = {
            "란베르스": { "initialCoefficient": 21, "healthCoefficient": 35, "attackCoefficient": 31, "defenseCoefficient": 19, "agilityCoefficient": 22 },
            "반기노": { "initialCoefficient": 22, "healthCoefficient": 26, "attackCoefficient": 29, "defenseCoefficient": 29, "agilityCoefficient": 14 },
            "쿠보": { "initialCoefficient": 22, "healthCoefficient": 25, "attackCoefficient": 28, "defenseCoefficient": 26, "agilityCoefficient": 14 }
        };

        let selectedPet = null;
        Decimal.set({ precision: 20, rounding: Decimal.ROUND_DOWN });

        function getCho(s) {
            const c = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let r = "";
            for(let i=0; i<s.length; i++) {
                let code = s.charCodeAt(i) - 44032;
                if(code >= 0 && code <= 11172) r += c[Math.floor(code/588)];
                else r += s.charAt(i);
            }
            return r;
        }

        // 인게임 실제 S급 수치 로직 (보너스 제외, 랜덤 변수 +2 최상위 기준)
        function getSGradeStats(pet) {
            const ic = new Decimal(pet.initialCoefficient);
            const calcBase = (val) => new Decimal(val).plus(2).times(ic).dividedBy(100).floor();

            const iH = calcBase(pet.healthCoefficient);
            const iA = calcBase(pet.attackCoefficient);
            const iD = calcBase(pet.defenseCoefficient);
            const iG = calcBase(pet.agilityCoefficient);

            return {
                A: iH.times(0.1).plus(iA).plus(iD.times(0.1)).plus(iG.times(0.05)).floor().toNumber(),
                D: iH.times(0.1).plus(iA.times(0.1)).plus(iD).plus(iG.times(0.05)).floor().toNumber(),
                G: iG.toNumber(),
                H: iH.times(4).plus(iA).plus(iD).plus(iG).floor().toNumber()
            };
        }

        const sIn = document.getElementById('pet-search');
        const sBox = document.getElementById('suggestions');

        sIn.addEventListener('input', () => {
            const v = sIn.value.trim();
            sBox.innerHTML = "";
            if (!v) { sBox.style.display = "none"; return; }
            const q = getCho(v);
            const m = Object.keys(petData).filter(n => n.includes(v) || getCho(n).includes(q)).slice(0, 10);
            if(m.length > 0) {
                sBox.style.display = "block";
                m.forEach(name => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.onclick = () => { 
                        sIn.value = name; 
                        selectedPet = petData[name]; 
                        sBox.style.display = "none";
                        const s = getSGradeStats(selectedPet);
                        document.getElementById('inA').placeholder = s.A;
                        document.getElementById('inD').placeholder = s.D;
                        document.getElementById('inG').placeholder = s.G;
                        document.getElementById('inH').placeholder = s.H;
                    };
                    sBox.appendChild(li);
                });
            } else { sBox.style.display = "none"; }
        });

        document.getElementById('calculate-btn').addEventListener('click', () => {
            if (!selectedPet) return;
            
            const tA = parseInt(document.getElementById('inA').value) || parseInt(document.getElementById('inA').placeholder);
            const tD = parseInt(document.getElementById('inD').value) || parseInt(document.getElementById('inD').placeholder);
            const tG = parseInt(document.getElementById('inG').value) || parseInt(document.getElementById('inG').placeholder);
            const tH = parseInt(document.getElementById('inH').value) || parseInt(document.getElementById('inH').placeholder);

            let matched = 0, sGrade = 0;
            const ic = new Decimal(selectedPet.initialCoefficient);

            for (let aR = -2; aR <= 2; aR++) {
            for (let dR = -2; dR <= 2; dR++) {
            for (let gR = -2; gR <= 2; gR++) {
            for (let hR = -2; hR <= 2; hR++) {
            for (let aB = 0; aB <= 10; aB++) {
            for (let dB = 0; dB <= 10 - aB; dB++) {
            for (let gB = 0; gB <= 10 - aB - dB; gB++) {
                const hB = 10 - aB - dB - gB;
                const iH = new Decimal(selectedPet.healthCoefficient).plus(hR).plus(hB).times(ic).dividedBy(100).floor();
                const iA = new Decimal(selectedPet.attackCoefficient).plus(aR).plus(aB).times(ic).dividedBy(100).floor();
                const iD = new Decimal(selectedPet.defenseCoefficient).plus(dR).plus(dB).times(ic).dividedBy(100).floor();
                const iG = new Decimal(selectedPet.agilityCoefficient).plus(gR).plus(gB).times(ic).dividedBy(100).floor();

                if (iG.toNumber() !== tG) continue;

                const curA = iH.times(0.1).plus(iA).plus(iD.times(0.1)).plus(iG.times(0.05)).floor().toNumber();
                const curD = iH.times(0.1).plus(iA.times(0.1)).plus(iD).plus(iG.times(0.05)).floor().toNumber();
                const curH = iH.times(4).plus(iA).plus(iD).plus(iG).floor().toNumber();

                if (curA === tA && curD === tD && curH === tH) {
                    matched++;
                    if (aR === 2 && dR === 2 && gR === 2 && hR === 2) sGrade++;
                }
            }}}}}}}

            const res = document.getElementById('result');
            if (matched === 0) res.innerHTML = "일치 데이터 없음";
            else {
                const prob = (sGrade / matched * 100).toFixed(4);
                res.innerHTML = `결합 수: <span class="hl">${matched}</span><br>성공 확률: <span class="hl">${prob}%</span>`;
            }
        });
    </script>
</body>
</html>
