<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>짜얄 계산기 - 데이터 매칭 통합본</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        /* 기존 스타일 유지 및 UI 최적화 */
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f0f8ff; display: flex; }
        .pet-list { width: 300px; height: 100vh; background: #ffffff; padding: 20px; box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1); overflow-y: auto; position: fixed; left: -300px; top: 0; box-sizing: border-box; transition: left 0.3s ease; z-index: 100; }
        .pet-list.visible { left: 0; }
        .pet-list h2 { text-align: center; color: #333; margin: 10px 0; }
        .pet-list ul { list-style: none; padding: 0; margin-top: 10px; }
        .pet-list li { padding: 10px; margin: 5px 0; background: #f9f9f9; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .pet-list li:hover { background-color: #f0f8ff; border-color: #007bff; }
        .pet-list li.active { background-color: #007bff; color: white; }
        
        .container { width: 100%; height: 100vh; background: #ffffff; padding: 20px; overflow-y: auto; box-sizing: border-box; transition: margin-left 0.3s ease; }
        .container.shrunk { margin-left: 300px; width: calc(100% - 300px); }

        .calc-card { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; }
        h1 { text-align: center; color: #333; }
        .notice { background: #e7f3fe; padding: 15px; border-radius: 10px; font-size: 14px; text-align: center; margin-bottom: 20px; border: 1px solid #b3d0f2; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* 공-방-순-체 그리드 배치 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button { width: 100%; padding: 15px; margin-top: 20px; background-color: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }

        .result { margin-top: 20px; padding: 20px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; text-align: center; min-height: 50px; }
        .toggle-pets-btn { position: fixed; top: 10px; left: 10px; z-index: 101; padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        ul#suggestions { list-style: none; padding: 0; background: #fff; border: 1px solid #ddd; border-radius: 8px; max-height: 150px; overflow-y: auto; display: none; margin-top: 2px; }
        ul#suggestions li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        ul#suggestions li:hover { background: #f0f8ff; }
    </style>
</head>
<body>
    <button class="toggle-pets-btn" id="toggle-pets-btn">☰ 페트목록</button>

    <div class="pet-list" id="sidebar">
        <h2>- 등록된 페트 -</h2>
        <ul id="pet-list-ui"></ul>
    </div>

    <div class="container" id="main-container">
        <div class="calc-card">
            <h1>짜얄 계산기 2</h1>
            <div class="notice">
                데이터 매칭 방식 수정 완료 (공-방-순-체 입력)<br>
                <strong>귤가로스</strong> 등 신규 페트 데이터 완벽 지원
            </div>

            <label>페트 이름</label>
            <div style="position: relative;">
                <input type="text" id="pet-name" placeholder="페트 이름 입력..." autocomplete="off">
                <ul id="suggestions"></ul>
            </div>

            <div class="stat-grid">
                <div>
                    <label>공격력</label>
                    <input type="number" id="inA" placeholder="공">
                </div>
                <div>
                    <label>방어력</label>
                    <input type="number" id="inD" placeholder="방">
                </div>
                <div>
                    <label>순발력</label>
                    <input type="number" id="inG" placeholder="순">
                </div>
                <div>
                    <label>체력</label>
                    <input type="number" id="inH" placeholder="체">
                </div>
            </div>

            <button id="calculate-btn">계산하기</button>
            <div id="result" class="result">페트를 선택하고 수치를 입력하세요.</div>
        </div>
    </div>

    <script>
        Decimal.set({ precision: 50, rounding: Decimal.ROUND_HALF_UP });

        // 기본 데이터 (귤가로스 포함)
        const defaultPetData = {
            "귤가로스": {
                "initialCoefficient": 28,
                "healthCoefficient": 23,
                "attackCoefficient": 35,
                "defenseCoefficient": 15,
                "agilityCoefficient": 25
            },
            "짜얄(kiketiti)": {initialCoefficient: 17, healthCoefficient: 25, attackCoefficient: 24, defenseCoefficient: 9, agilityCoefficient: 34}
        };

        let petData = JSON.parse(localStorage.getItem("petData")) || defaultPetData;
        let selectedPet = null;

        // 사이드바 토글
        document.getElementById("toggle-pets-btn").onclick = () => {
            document.getElementById("sidebar").classList.toggle("visible");
            document.getElementById("main-container").classList.toggle("shrunk");
        };

        // 페트 목록 렌더링
        function renderPetList() {
            const listUI = document.getElementById("pet-list-ui");
            listUI.innerHTML = "";
            Object.keys(petData).sort().forEach(name => {
                const li = document.createElement("li");
                li.textContent = name;
                li.onclick = () => selectPet(name);
                listUI.appendChild(li);
            });
        }

        // 페트 선택 및 가이드 수치 표시
        function selectPet(name) {
            selectedPet = petData[name];
            document.getElementById("pet-name").value = name;
            document.getElementById("suggestions").style.display = "none";
            
            // S급 이론치 계산 (랜덤2, 보너스2.5 고정)
            const guide = calculateIdealStats(selectedPet);
            document.getElementById("inA").placeholder = `S급: ${guide.a}`;
            document.getElementById("inD").placeholder = `S급: ${guide.d}`;
            document.getElementById("inG").placeholder = `S급: ${guide.g}`;
            document.getElementById("inH").placeholder = `S급: ${guide.h}`;
            
            document.querySelectorAll("#pet-list-ui li").forEach(li => {
                li.classList.toggle("active", li.textContent === name);
            });
        }

        // 핵심 계산 로직 (계수 이름 정적 매칭)
        function calculateIdealStats(pet) {
            const ic = new Decimal(pet.initialCoefficient);
            const r = 2; // S급 랜덤치
            const b = 2.5; // 보너스 평균

            const iH = new Decimal(pet.healthCoefficient).plus(r).plus(b).mul(ic).div(100);
            const iA = new Decimal(pet.attackCoefficient).plus(r).plus(b).mul(ic).div(100);
            const iD = new Decimal(pet.defenseCoefficient).plus(r).plus(b).mul(ic).div(100);
            const iG = new Decimal(pet.agilityCoefficient).plus(r).plus(b).mul(ic).div(100);

            return {
                a: iH.mul(0.1).add(iA).add(iD.mul(0.1)).add(iG.mul(0.05)).floor().toNumber(),
                d: iH.mul(0.1).add(iA.mul(0.1)).add(iD).add(iG.mul(0.05)).floor().toNumber(),
                g: iG.floor().toNumber(),
                h: iH.mul(4).add(iA).add(iD).add(iG).floor().toNumber()
            };
        }

        // 분석 실행
        document.getElementById("calculate-btn").onclick = () => {
            if (!selectedPet) { alert("페트를 먼저 선택하세요."); return; }

            const targetA = parseInt(document.getElementById("inA").value) || parseInt(document.getElementById("inA").placeholder);
            const targetD = parseInt(document.getElementById("inD").value) || parseInt(document.getElementById("inD").placeholder);
            const targetG = parseInt(document.getElementById("inG").value) || parseInt(document.getElementById("inG").placeholder);
            const targetH = parseInt(document.getElementById("inH").value) || parseInt(document.getElementById("inH").placeholder);

            let hit = 0;
            let totalPossible = 0;

            // 전수 조사 (랜덤 -2~2, 보너스 조합 10)
            for (let rA = -2; rA <= 2; rA++) {
                for (let rD = -2; rD <= 2; rD++) {
                    for (let rG = -2; rG <= 2; rG++) {
                        for (let rH = -2; rH <= 2; rH++) {
                            for (let bA = 0; bA <= 10; bA++) {
                                for (let bD = 0; bD <= 10 - bA; bD++) {
                                    for (let bG = 0; bG <= 10 - bA - bD; bG++) {
                                        const bH = 10 - bA - bD - bG;
                                        totalPossible++;

                                        const ic = selectedPet.initialCoefficient;
                                        const curIA = new Decimal(selectedPet.attackCoefficient + rA + bA).mul(ic).div(100);
                                        const curID = new Decimal(selectedPet.defenseCoefficient + rD + bD).mul(ic).div(100);
                                        const curIG = new Decimal(selectedPet.agilityCoefficient + rG + bG).mul(ic).div(100);
                                        const curIH = new Decimal(selectedPet.healthCoefficient + rH + bH).mul(ic).div(100);

                                        const resA = curIH.mul(0.1).add(curIA).add(curID.mul(0.1)).add(curIG.mul(0.05)).floor();
                                        const resD = curIH.mul(0.1).add(curIA.mul(0.1)).add(curID).add(curIG.mul(0.05)).floor();
                                        const resG = curIG.floor();
                                        const resH = curIH.mul(4).add(curIA).add(curID).add(curIG).floor();

                                        if (resA.eq(targetA) && resD.eq(targetD) && resG.eq(targetG) && resH.eq(targetH)) hit++;
                                    }
                                }
                            }
                        }
                    }
                }
            }

            const resDiv = document.getElementById("result");
            resDiv.innerHTML = hit > 0 
                ? `분석 완료: <span style="color:red; font-weight:bold;">${hit}</span>개의 가능성 발견!`
                : "입력한 수치로 나올 수 있는 조합이 없습니다.";
        };

        // 초기화
        window.onload = renderPetList;
    </script>
</body>
</html>
