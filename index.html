<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S급 정밀 분석기 - 통합형</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        /* 기존 디자인 유지 및 다크 모드 최적화 */
        :root { --bg: #0b101a; --panel: #161a24; --gold: #e6b94d; --text: #d1d8e0; --btn: #28a745; --input-bg: #070a10; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text); display: flex; }

        .pet-list { width: 300px; height: 100vh; background: var(--panel); padding: 20px; box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5); overflow-y: auto; position: fixed; left: -300px; top: 0; box-sizing: border-box; transition: left 0.3s ease; border-right: 1px solid #252e3f; }
        .pet-list.visible { left: 0; }
        .pet-list h2 { text-align: center; color: var(--gold); margin: 10px 0; font-size: 18px; }
        .pet-list ul { list-style: none; padding: 0; margin-top: 10px; }
        .pet-list li { padding: 12px; margin: 5px 0; background: #1c222d; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; border: 1px solid transparent; }
        .pet-list li:hover { border-color: var(--gold); background: #252e3f; }
        .pet-list li.active { background-color: #1e3a5f; border-color: var(--gold); }

        .container { width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; transition: margin-left 0.3s ease; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .container.shrunk { margin-left: 300px; width: calc(100% - 300px); }

        .calc-card { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #252e3f; }
        h1 { text-align: center; color: var(--gold); margin-bottom: 25px; }

        label { display: block; margin-top: 15px; font-weight: bold; color: var(--gold); font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #252e3f; border-radius: 8px; font-size: 16px; background-color: var(--input-bg); color: #fff; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(230, 185, 77, 0.2); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        
        button { width: 100%; padding: 15px; margin-top: 25px; background-color: var(--btn); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; transform: translateY(-2px); }

        .result { margin-top: 20px; padding: 20px; background: var(--input-bg); border: 1px solid #252e3f; border-radius: 10px; text-align: center; line-height: 1.8; font-size: 16px; }
        .hl { color: var(--gold); font-weight: bold; }
        
        .toggle-pets-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: #1e3a5f; color: white; border: none; border-radius: 50%; cursor: pointer; z-index: 100; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #suggestions { list-style: none; padding: 0; background: #1a2233; border: 1px solid var(--gold); border-radius: 8px; max-height: 150px; overflow-y: auto; display: none; margin-top: 5px; }
        #suggestions li { padding: 10px; cursor: pointer; color: #fff; border-bottom: 1px solid #252e3f; }
        #suggestions li:hover { background: #252e3f; }
    </style>
</head>
<body>
    <button class="toggle-pets-btn" id="toggle-pets-btn">☰</button>

    <div class="pet-list" id="pet-sidebar">
        <h2>- 등록된 페트 -</h2>
        <ul id="pet-list-ui"></ul>
    </div>

    <div class="container" id="main-container">
        <div class="calc-card">
            <h1>분석 계산기</h1>
            
            <label>페트 이름</label>
            <div style="position: relative;">
                <input type="text" id="pet-name" placeholder="이름 또는 초성 입력..." autocomplete="off">
                <ul id="suggestions"></ul>
            </div>

            <div class="stat-grid">
                <div>
                    <label>공격력</label>
                    <input type="number" id="inA" placeholder="공격력">
                </div>
                <div>
                    <label>방어력</label>
                    <input type="number" id="inD" placeholder="방어력">
                </div>
                <div>
                    <label>순발력</label>
                    <input type="number" id="inG" placeholder="순발력">
                </div>
                <div>
                    <label>체력</label>
                    <input type="number" id="inH" placeholder="체력">
                </div>
            </div>

            <button id="calculate-btn">분석 실행</button>
            <div id="result" class="result">페트를 선택하고 수치를 입력하세요.</div>
        </div>
    </div>

    <script>
        // Decimal.js 설정
        Decimal.set({ precision: 50, rounding: Decimal.ROUND_HALF_UP });

        let petData = {};
        let selectedPet = null;

        // 1. 데이터 로드 (pet.json 우선, 없으면 로컬스토리지)
        async function loadData() {
            try {
                const response = await fetch('pet.json');
                if (response.ok) {
                    petData = await response.json();
                } else {
                    throw new Error();
                }
            } catch (e) {
                console.warn("pet.json을 찾을 수 없어 로컬 데이터를 사용합니다.");
                petData = JSON.parse(localStorage.getItem("petData")) || {
                    "샘플페트": {initialCoefficient: 16, healthCoefficient: 30, attackCoefficient: 29, defenseCoefficient: 10, agilityCoefficient: 37}
                };
            }
            renderPetList();
        }

        // 초성 추출 함수
        function getCho(str) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let res = "";
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i) - 44032;
                if (code >= 0 && code <= 11172) res += cho[Math.floor(code / 588)];
                else res += str[i];
            }
            return res;
        }

        // 사이드바 목록 출력
        function renderPetList() {
            const listUI = document.getElementById("pet-list-ui");
            listUI.innerHTML = "";
            Object.keys(petData).sort().forEach(name => {
                const li = document.createElement("li");
                li.textContent = name;
                li.onclick = () => selectPet(name);
                listUI.appendChild(li);
            });
        }

        // 페트 선택 로직
        function selectPet(name) {
            selectedPet = petData[name];
            document.getElementById("pet-name").value = name;
            document.getElementById("suggestions").style.display = "none";
            
            // 사이드바 활성화 표시
            document.querySelectorAll("#pet-list-ui li").forEach(li => {
                li.classList.toggle("active", li.textContent === name);
            });

            // 가이드 수치(S급 기준) 미리보기 계산 (랜덤2, 보너스2.5 고정)
            const guide = calculateGuide(selectedPet);
            document.getElementById("inA").placeholder = `S급: ${Math.floor(guide.a)}`;
            document.getElementById("inD").placeholder = `S급: ${Math.floor(guide.d)}`;
            document.getElementById("inG").placeholder = `S급: ${Math.floor(guide.g)}`;
            document.getElementById("inH").placeholder = `S급: ${Math.floor(guide.h)}`;
        }

        function calculateGuide(pet) {
            const calc = (coeff) => new Decimal(coeff).plus(2).plus(2.5).times(pet.initialCoefficient).div(100);
            const iA = calc(pet.attackCoefficient);
            const iD = calc(pet.defenseCoefficient);
            const iG = calc(pet.agilityCoefficient);
            const iH = calc(pet.healthCoefficient);

            return {
                a: iH.mul(0.1).add(iA).add(iD.mul(0.1)).add(iG.mul(0.05)),
                d: iH.mul(0.1).add(iA.mul(0.1)).add(iD).add(iG.mul(0.05)),
                g: iG,
                h: iH.mul(4).add(iA).add(iD).add(iG)
            };
        }

        // 검색 자동완성
        const nameInput = document.getElementById("pet-name");
        const suggestionBox = document.getElementById("suggestions");

        nameInput.addEventListener("input", () => {
            const val = nameInput.value.trim();
            suggestionBox.innerHTML = "";
            if (!val) { suggestionBox.style.display = "none"; return; }

            const queryCho = getCho(val);
            const matches = Object.keys(petData).filter(n => n.includes(val) || getCho(n).includes(queryCho));

            if (matches.length > 0) {
                suggestionBox.style.display = "block";
                matches.slice(0, 10).forEach(m => {
                    const li = document.createElement("li");
                    li.textContent = m;
                    li.onclick = () => selectPet(m);
                    suggestionBox.appendChild(li);
                });
            } else {
                suggestionBox.style.display = "none";
            }
        });

        // 사이드바 토글
        document.getElementById("toggle-pets-btn").onclick = () => {
            document.getElementById("pet-sidebar").classList.toggle("visible");
            document.getElementById("main-container").classList.toggle("shrunk");
        };

        // 메인 계산 로직 (기존 정밀도 유지)
        document.getElementById("calculate-btn").onclick = () => {
            if (!selectedPet) { alert("페트를 먼저 선택해 주세요."); return; }

            const targetA = parseInt(document.getElementById("inA").value);
            const targetD = parseInt(document.getElementById("inD").value);
            const targetG = parseInt(document.getElementById("inG").value);
            const targetH = parseInt(document.getElementById("inH").value);

            if (isNaN(targetA) || isNaN(targetD) || isNaN(targetG) || isNaN(targetH)) {
                alert("모든 수치를 입력해 주세요."); return;
            }

            let hit = 0;
            let totalPossible = 0;
            let sGradeHit = 0;

            // 5^4 (랜덤) * 11^3 (보너스 조합) 전수 조사
            for (let rA = -2; rA <= 2; rA++) {
                for (let rD = -2; rD <= 2; rD++) {
                    for (let rG = -2; rG <= 2; rG++) {
                        for (let rH = -2; rH <= 2; rH++) {
                            for (let bA = 0; bA <= 10; bA++) {
                                for (let bD = 0; bD <= 10 - bA; bD++) {
                                    for (let bG = 0; bG <= 10 - bA - bD; bG++) {
                                        const bH = 10 - bA - bD - bG;
                                        
                                        totalPossible++;

                                        const iA = new Decimal(selectedPet.attackCoefficient).plus(rA).plus(bA).mul(selectedPet.initialCoefficient).div(100);
                                        const iD = new Decimal(selectedPet.defenseCoefficient).plus(rD).plus(bD).mul(selectedPet.initialCoefficient).div(100);
                                        const iG = new Decimal(selectedPet.agilityCoefficient).plus(rG).plus(bG).mul(selectedPet.initialCoefficient).div(100);
                                        const iH = new Decimal(selectedPet.healthCoefficient).plus(rH).plus(bH).mul(selectedPet.initialCoefficient).div(100);

                                        const curA = iH.mul(0.1).add(iA).add(iD.mul(0.1)).add(iG.mul(0.05)).floor();
                                        const curD = iH.mul(0.1).add(iA.mul(0.1)).add(iD).add(iG.mul(0.05)).floor();
                                        const curG = iG.floor();
                                        const curH = iH.mul(4).add(iA).add(iD).add(iG).floor();

                                        if (curA.eq(targetA) && curD.eq(targetD) && curG.eq(targetG) && curH.eq(targetH)) {
                                            hit++;
                                            if (rA === 2 && rD === 2 && rG === 2 && rH === 2) sGradeHit++;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }

            const resDiv = document.getElementById("result");
            if (hit === 0) {
                resDiv.innerHTML = "입력하신 수치로 나올 수 있는 <br>계산 결과가 없습니다.";
            } else {
                const sProb = ((sGradeHit / hit) * 100).toFixed(2);
                const spawnProb = ((hit / totalPossible) * 100).toFixed(4);
                resDiv.innerHTML = `
                    분석 결과 매칭 케이스: <span class="hl">${hit}개</span><br>
                    S급(All+2) 확률: <span class="hl">${sProb}%</span><br>
                    해당 수치 출현율: <span class="hl">${spawnProb}%</span><br>
                    <small style="color:#888;">* 모든 결과는 소숫점 50자리 정밀 연산 결과입니다.</small>
                `;
            }
        };

        window.onload = loadData;
    </script>
</body>
</html>
