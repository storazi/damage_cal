<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        :root { --bg: #0b101a; --panel: #161a24; --gold: #e6b94d; --text: #d1d8e0; --btn: #28a745; --input-bg: #070a10; }
        body { background: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #252e3f; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        
        h1 { text-align: center; color: var(--gold); font-size: 24px; margin-bottom: 25px; }
        .status-badge { text-align: center; font-size: 12px; margin-bottom: 20px; padding: 5px; border-radius: 5px; background: #1e2533; color: #888; }
        
        label { display: block; font-size: 13px; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #252e3f; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; margin-bottom: 15px; font-size: 16px; }
        input:focus { border-color: var(--gold); }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .stat-grid input { text-align: center; padding: 12px 5px; font-weight: bold; }
        .stat-grid input::placeholder { color: #555; font-size: 12px; font-weight: normal; }

        #calculate-btn { width: 100%; padding: 16px; background: var(--btn); border: none; color: white; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 10px; transition: 0.2s; margin-top: 10px; }
        #calculate-btn:hover { background: #218838; transform: translateY(-1px); }

        .result-box { margin-top: 25px; padding: 20px; background: var(--input-bg); border-radius: 12px; border: 1px solid #252e3f; line-height: 1.8; font-size: 15px; min-height: 100px; }
        .hl { color: var(--gold); font-weight: bold; }
        .prob-val { color: #ffeb3b; font-weight: bold; }

        #suggestions { list-style: none; padding: 0; margin: 0; position: absolute; width: calc(100% - 60px); max-width: 440px; background: #1a2233; border: 1px solid var(--gold); z-index: 10; display: none; border-radius: 8px; max-height: 200px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #suggestions li { padding: 12px; border-bottom: 1px solid #252e3f; cursor: pointer; color: #fff; }
        #suggestions li:hover { background: #252e3f; }

        #loading { display: none; text-align: center; margin-top: 10px; color: var(--gold); font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>계산기</h1>
        <div id="data-status" class="status-badge">pet.json 데이터를 불러오는 중...</div>

        <div style="position: relative;">
            <label>페트 이름 검색</label>
            <input type="text" id="pet-search" placeholder="이름 또는 초성 입력" autocomplete="off">
            <ul id="suggestions"></ul>
        </div>

        <label>현재 능력치 입력 (공격 | 방어 | 순발 | 체력)</label>
        <div class="stat-grid">
            <input type="number" id="inA" placeholder="공">
            <input type="number" id="inD" placeholder="방">
            <input type="number" id="inG" placeholder="순">
            <input type="number" id="inH" placeholder="체">
        </div>

        <button id="calculate-btn">분석 실행</button>
        <div id="loading">데이터 전수 조사 중... 잠시만 기다려주세요.</div>

        <div id="result" class="result-box">
            페트를 선택하고 현재 능력치를 입력해 주세요.
        </div>
    </div>

    <script>
        Decimal.set({ precision: 50, rounding: Decimal.ROUND_HALF_UP });
        let petData = {};
        let selectedPet = null;

        async function loadPetData() {
            try {
                const response = await fetch('pet.json');
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                petData = await response.json();
                document.getElementById('data-status').innerText = `✅ ${Object.keys(petData).length}마리의 페트 데이터 로드 완료`;
                document.getElementById('data-status').style.color = "#2ecc71";
            } catch (err) {
                document.getElementById('data-status').innerText = "❌ pet.json 파일을 찾을 수 없습니다.";
                document.getElementById('data-status').style.color = "#e74c3c";
            }
        }

        function getCho(s) {
            const c = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let r = "";
            for(let i=0; i<s.length; i++) {
                let code = s.charCodeAt(i) - 44032;
                if(code >= 0 && code <= 11172) r += c[Math.floor(code/588)];
                else r += s.charAt(i);
            }
            return r;
        }

        const sIn = document.getElementById('pet-search');
        const sBox = document.getElementById('suggestions');

        sIn.oninput = function() {
            const v = this.value.trim();
            sBox.innerHTML = "";
            if (!v) { sBox.style.display = "none"; return; }
            const q = getCho(v);
            const matches = Object.keys(petData).filter(n => n.includes(v) || getCho(n).includes(q));
            if(matches.length > 0) {
                sBox.style.display = "block";
                matches.slice(0, 10).forEach(name => {
                    const li = document.createElement('li');
                    li.innerText = name;
                    li.onclick = () => {
                        sIn.value = name;
                        selectedPet = petData[name];
                        sBox.style.display = "none";
                        document.getElementById('result').innerHTML = `<span class="hl">${name}</span> 페트가 선택되었습니다.`;
                    };
                    sBox.appendChild(li);
                });
            }
        };

        document.getElementById('calculate-btn').onclick = function() {
            if(!selectedPet) { alert("페트를 먼저 선택하세요!"); return; }

            const tA = parseInt(document.getElementById('inA').value);
            const tD = parseInt(document.getElementById('inD').value);
            const tG = parseInt(document.getElementById('inG').value);
            const tH = parseInt(document.getElementById('inH').value);

            if(isNaN(tA) || isNaN(tD) || isNaN(tG) || isNaN(tH)) {
                alert("모든 능력치를 숫자로 입력해 주세요.");
                return;
            }

            document.getElementById('loading').style.display = "block";

            setTimeout(() => {
                let hitCount = 0;
                let sGradeCount = 0;
                const totalCases = 178750; 
                const ic = new Decimal(selectedPet.initialCoefficient);

                for (let rA = -2; rA <= 2; rA++) {
                    for (let rD = -2; rD <= 2; rD++) {
                        for (let rG = -2; rG <= 2; rG++) {
                            for (let rH = -2; rH <= 2; rH++) {
                                for (let bA = 0; bA <= 10; bA++) {
                                    for (let bD = 0; bD <= 10 - bA; bD++) {
                                        for (let bG = 0; bG <= 10 - bA - bD; bG++) {
                                            const bH = 10 - bA - bD - bG;

                                            const cA = new Decimal(selectedPet.attackCoefficient + rA + bA).mul(ic).div(100);
                                            const cD = new Decimal(selectedPet.defenseCoefficient + rD + bD).mul(ic).div(100);
                                            const cG = new Decimal(selectedPet.agilityCoefficient + rG + bG).mul(ic).div(100);
                                            const cH = new Decimal(selectedPet.healthCoefficient + rH + bH).mul(ic).div(100);

                                            const resA = cH.mul(0.1).add(cA).add(cD.mul(0.1)).add(cG.mul(0.05)).floor();
                                            const resD = cH.mul(0.1).add(cA.mul(0.1)).add(cD).add(cG.mul(0.05)).floor();
                                            const resG = cG.floor();
                                            const resH = cH.mul(4).add(cA).add(cD).add(cG).floor();

                                            if (resA.eq(tA) && resD.eq(tD) && resG.eq(tG) && resH.eq(tH)) {
                                                hitCount++;
                                                if(rA === 2 && rD === 2 && rG === 2 && rH === 2) sGradeCount++;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                const sProb = hitCount > 0 ? ((sGradeCount / hitCount) * 100).toFixed(2) : 0;
                const spawnProb = ((hitCount / totalCases) * 100).toFixed(4);

                document.getElementById('loading').style.display = "none";
                document.getElementById('result').innerHTML = `
                    분석 결과 매칭 조합: <span class="hl">${hitCount.toLocaleString()}개</span> 발견<br>
                    해당 수치 출현 확률: <span class="prob-val">${spawnProb}%</span><br>
                    <hr style="border:0.5px solid #252e3f; margin:15px 0;">
                    현재 수치에서 <span class="hl">S급</span>일 확률:<br>
                    <span class="prob-val" style="font-size:24px;">${sProb}%</span><br>
                    <small style="color:#888;">* 모든 결과는 Decimal.js 정밀 연산 기반입니다.</small>
                `;
            }, 50);
        };

        window.onload = loadPetData;
    </script>
</body>
</html>
